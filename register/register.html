<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi SKP2M</title>
<link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

<img
    src="../logo.png"
    alt="Logo SKP2M"
    class="register-logo">

    <h1>Registrasi Member</h1>

    <div id="register-box">

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="tel"
        id="phone"
        placeholder="Nomor WhatsApp">

        <button onclick="registerUser()">
            Daftar
        </button>

    </div>

    <div id="member-box" style="display:none;">

        <h2>Selamat Datang</h2>

        <p id="member-name"></p>

        <button onclick="logoutUser()">
            Reset Data
        </button>

    </div>

</div>

<script>

const user =
localStorage.getItem(
    "skp2m_user"
);

if(user){

    window.location.href =
    "../index.html";

}

function registerUser(){

    const username =
    document.getElementById("username").value;

    const phone =
    document.getElementById("phone").value;

    if(!username || !phone){

        alert("Lengkapi data dulu!");

        return;
    }

    localStorage.setItem(
        "skp2m_user",
        JSON.stringify({
            username,
            phone
        })
    );

    loadUser();
}

function loadUser(){

    const data =
    localStorage.getItem("skp2m_user");

    if(!data) return;

    const user =
    JSON.parse(data);

    document.getElementById(
        "register-box"
    ).style.display = "none";

    document.getElementById(
        "member-box"
    ).style.display = "block";

    document.getElementById(
        "member-name"
    ).innerText =
    `👤 ${user.username}`;
}

function logoutUser(){

    localStorage.removeItem(
        "skp2m_user"
    );

    location.reload();
}

window.onload = loadUser;

</script>

</body>
</html>
