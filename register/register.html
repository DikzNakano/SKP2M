<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registrasi SKP2M</title>
<link rel="stylesheet" href="register.css">
</head>
<body>

<div class="container">

<img
    src="../logo.png"
    alt="Logo SKP2M"
    class="register-logo">

    <h1>Registrasi Member</h1>

    <div id="register-box">

        <input
        type="text"
        id="username"
        placeholder="Username">

        <input
        type="tel"
        id="phone"
        placeholder="Nomor WhatsApp">

        <button onclick="registerUser()">
            Daftar
        </button>

    </div>

    <div id="member-box" style="display:none;">

        <h2>Selamat Datang</h2>

        <p id="member-name"></p>

        <button onclick="logoutUser()">
            Reset Data
        </button>

    </div>

</div>

<script src="../script.js"></script>

</body>
</html>
